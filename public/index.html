<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone (No Login)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between font-sans">

    <div id="setup-screen" class="fixed inset-0 bg-emerald-600 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96 text-center">
            <h2 class="text-2xl font-bold text-emerald-600 mb-4">Masuk WhatsApp Clone</h2>
            <input type="text" id="username" placeholder="Masukkan Nama Kamu..." class="w-full p-2 border rounded mb-3 outline-none focus:border-emerald-500">
            
            <label class="block text-left text-sm font-medium text-gray-700 mb-1">Foto Profil:</label>
            <input type="file" id="avatar-input" accept="image/*" class="w-full text-sm text-gray-500 mb-4">
            
            <button onclick="startApp()" class="w-full bg-emerald-500 text-white py-2 rounded font-bold hover:bg-emerald-600">Mulai Chatting</button>
        </div>
    </div>

    <div class="bg-emerald-700 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <img id="my-avatar-display" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-white object-cover">
            <div>
                <h1 id="my-name-display" class="font-bold">Nama Kamu</h1>
                <span class="text-xs text-emerald-200">Online</span>
            </div>
        </div>
        <div class="space-x-2">
            <button onclick="startCall(false)" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded text-sm font-semibold">📞 Telepon</button>
            <button onclick="startCall(true)" class="bg-emerald-500 hover:bg-emerald-400 px-3 py-1.5 rounded text-sm font-semibold">📹 Video Call</button>
        </div>
    </div>

    <div id="video-grid" class="hidden bg-black p-4 grid grid-cols-2 gap-4 h-64 relative">
        <video id="local-video" autoplay muted class="w-full h-full object-cover rounded bg-gray-800"></video>
        <video id="remote-video" autoplay class="w-full h-full object-cover rounded bg-gray-800"></video>
        <button onclick="endCall()" class="absolute bottom-2 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-4 py-1 rounded text-xs font-bold">Tutup Panggilan</button>
    </div>

    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-[#efeae2]">
        </div>

    <div class="bg-gray-200 p-3 flex items-center space-x-2">
        <input type="text" id="message-input" placeholder="Ketik pesan..." class="flex-1 p-2 rounded-lg outline-none">
        <button onclick="sendMessage()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-emerald-700">Kirim</button>
    </div>

</body>
</html>
